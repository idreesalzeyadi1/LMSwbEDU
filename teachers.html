<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduAcademy — All Teachers</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-hero {
      background: linear-gradient(135deg, #3C3489 0%, #5b4fcf 100%);
      color: #fff;
      padding: 6rem 1.5rem 3rem;
      text-align: center;
    }
    .page-hero h1 { font-size: 2.2rem; margin-bottom: .5rem; }
    .page-hero p  { opacity: .85; font-size: 1.05rem; }

    .teachers-page-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .teacher-list {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin-top: 2rem;
    }

    .teacher-row {
      background: #fff;
      border: 1px solid #e8e8f0;
      border-radius: 14px;
      padding: 1.4rem 1.6rem;
      display: flex;
      align-items: center;
      gap: 1.4rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
      transition: box-shadow .2s, transform .2s;
    }

    .tr-avatar {
      width: 58px; height: 58px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 1.15rem; flex-shrink: 0;
    }

    .tr-info { flex: 1; min-width: 0; }
    .tr-name { font-weight: 700; font-size: 1.05rem; color: #1a1a2e; }
    .tr-subject { color: #3C3489; font-size: .88rem; font-weight: 600; }

    .tr-stats {
      display: flex; flex-direction: column; align-items: flex-end;
      gap: .3rem; flex-shrink: 0; min-width: 130px;
    }
    .tr-rating { font-size: .95rem; color: #f59e0b; font-weight: 700; }
    .tr-fee { font-size: .92rem; font-weight: 700; color: #1a1a2e; }

    .tr-btn {
      background: #3C3489; color: #fff; border: none; border-radius: 8px;
      padding: .55rem 1.1rem; font-size: .85rem; font-weight: 600;
      cursor: pointer; text-decoration: none; text-align: center;
    }

    .load-more-box { text-align: center; margin-top: 40px; }
    .btn-load {
      background: #fff; color: #3C3489; border: 2px solid #3C3489;
      padding: 12px 35px; font-weight: 700; border-radius: 10px;
      cursor: pointer; transition: all 0.3s;
    }
    .btn-load:hover { background: #3C3489; color: #fff; }

    @media (max-width: 620px) {
      .teacher-row { flex-wrap: wrap; }
      .tr-stats { align-items: flex-start; min-width: unset; }
    }
  </style>
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="nav-logo">EduAcademy</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="teachers.html" class="active">Teachers</a></li>
      <li><a href="courses.html">Courses</a></li>
      <li><a href="enroll.html">Enroll</a></li>
    </ul>
    <div id="navAuth"></div>
  </nav>

  <div class="page-hero">
    <h1>All Teachers</h1>
    <p>Browse our verified and experienced teachers</p>
  </div>

  <div class="teachers-page-section">
    <div class="filters-row">
      <select id="filterSubject" onchange="applyFilters()">
        <option value="">All Subjects</option>
        <option value="Mathematics">Mathematics</option>
        <option value="Physics">Physics</option>
        <option value="English">English</option>
        <option value="Chemistry">Chemistry</option>
        <option value="Biology">Biology</option>
        <option value="Urdu">Urdu</option>
      </select>
      <button class="reset-btn" onclick="resetFilters()">Reset</button>
    </div>

    <p class="results-count" id="resultsCount"><span>0</span> teachers found</p>

    <div class="teacher-list" id="teacherList">
      <p style="text-align:center;color:#999;padding:2rem;">Teachers load ho rahe hain...</p>
    </div>

    <div class="load-more-box">
      <button id="seeMoreBtn" onclick="loadMore()" class="btn-load" style="display:none;">
        See More Teachers
      </button>
    </div>
  </div>

  <!-- script.js type=module hai kyunki Firebase import use karta hai -->
  <script type="module" src="script.js"></script>
  <script type="module" src="auth.js"></script>

</body>
</html>
